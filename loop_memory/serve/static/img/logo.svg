<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="Loop Memory">
  <title>Loop Memory</title>
  <defs>
    <linearGradient id="lm-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0b1120"/>
    </linearGradient>
    <linearGradient id="lm-arc-active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="lm-arc-decay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <radialGradient id="lm-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lm-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark, anchored at left -->
  <g transform="translate(0 0)">
    <rect width="64" height="64" rx="16" fill="url(#lm-card)"/>
    <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" fill="none" stroke="rgba(255,255,255,0.13)"/>
    <circle cx="32" cy="32" r="26" fill="url(#lm-halo)"/>
    <g transform="translate(32 32)" fill="none" stroke-linecap="round">
      <path d="M -20,-3 A 20,20 0 1 1 20,-3" stroke="url(#lm-arc-active)" stroke-width="3" opacity="0.95"/>
      <path d="M 20,3 A 20,20 0 1 1 -20,3" stroke="url(#lm-arc-decay)" stroke-width="3" opacity="0.95"/>
      <circle cx="0" cy="0" r="13" stroke="rgba(167,139,250,0.45)" stroke-width="1.4" stroke-dasharray="2 2.5"/>
    </g>
    <circle cx="32" cy="32" r="11" fill="url(#lm-core)"/>
    <circle cx="32" cy="32" r="4" fill="#ffffff"/>
    <circle cx="32" cy="32" r="2.2" fill="#7c3aed"/>
    <circle cx="12" cy="29" r="2.4" fill="#67e8f9"/>
    <circle cx="52" cy="35" r="2.4" fill="#fde047"/>
  </g>

  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Inter', system-ui, sans-serif">
    <text x="80" y="34" font-size="22" font-weight="700" fill="#f8fafc" letter-spacing="-0.6">Loop</text>
    <text x="80" y="54" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="-0.4">Memory</text>
  </g>
</svg>
