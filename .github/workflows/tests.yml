name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-cov ruff mypy

      - name: Lint (ruff)
        run: |
          ruff check loop_memory tests

      - name: Type check (mypy) [advisory]
        continue-on-error: true
        run: |
          mypy loop_memory || echo "::warning::mypy reported issues (see logs); currently advisory only"

      - name: Smoke-check example
        run: |
          python -m loop_memory.examples.demo > /tmp/demo.out
          tail -n 5 /tmp/demo.out

      - name: Run unit tests
        run: |
          pytest -q --cov=loop_memory --cov-report=term-missing --cov-fail-under=55

      - name: Verify CLI entrypoints
        run: |
          python -m loop_memory.cli.main stats
